name: update-graph-data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate runtime signals
        run: python3 .github/scripts/generate_runtime_signals.py

      - name: Commit data updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data/*.json || true
          git commit -m "update runtime signals" || echo "no changes"
          git push
