name: update-graph-data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Ensure data dir
        run: mkdir -p docs/data

      - name: Generate runtime signals
        run: python .github/scripts/generate_runtime_signals.py

      - name: Verify output
        run: cat docs/data/runtime_signals.json

      - name: Commit data updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data/*.json || true
          git diff --cached --quiet || git commit -m "update runtime signals"
          git push
