name: update-stats
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: fetch and update stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STARS=$(gh api graphql -f query='query{user(login:"GnomeMan4201"){repositories(first:100,ownerAffiliations:OWNER){nodes{stargazerCount}}}}' --jq '[.data.user.repositories.nodes[].stargazerCount]|add')
          FOLLOWERS=$(gh api users/GnomeMan4201 --jq '.followers')
          REPOS=$(gh api users/GnomeMan4201 --jq '.public_repos')
          CONTRIBUTIONS=$(gh api graphql -f query='query{user(login:"GnomeMan4201"){contributionsCollection{contributionCalendar{totalContributions}}}}' --jq '.data.user.contributionsCollection.contributionCalendar.totalContributions')
          UPDATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          python3 - << PYEOF
          import re, os
          from pathlib import Path
          txt = Path("README.md").read_text()
          txt = re.sub(r"GitHub Stars\s+\d+\s+across \d+ public repos", f"GitHub Stars          {os.environ['STARS']:>8}        across {os.environ['REPOS']} public repos", txt)
          txt = re.sub(r"Followers\s+\d+\s+organic", f"Followers             {os.environ['FOLLOWERS']:>8}        organic", txt)
          txt = re.sub(r"Contributions\s+\d+\s+last 12 months", f"Contributions         {os.environ['CONTRIBUTIONS']:>8}        last 12 months", txt)
          txt = re.sub(r"last updated: [\d\-T:Z]+", f"last updated: {os.environ['UPDATED']}", txt)
          Path("README.md").write_text(txt)
          print("stats updated")
          PYEOF
      - name: commit
        run: |
          git config user.email "action@github.com"
          git config user.name "stats-bot"
          git diff --quiet README.md || (git add README.md && git commit -m "auto: update signals [skip ci]" && git push)
