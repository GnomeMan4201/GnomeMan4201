<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1000 920">
  <defs>
    <pattern id="bgrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#023e8a" stroke-width="0.4" opacity="0.18"/>
    </pattern>
    <style>
      @keyframes ring-pulse  { 0%,100%{opacity:.12} 50%{opacity:.28} }
      @keyframes ring-pulse2 { 0%,100%{opacity:.08} 50%{opacity:.20} }
      @keyframes ring-pulse3 { 0%,100%{opacity:.05} 50%{opacity:.14} }
      @keyframes data-flow   { to{stroke-dashoffset:-80} }
      @keyframes data-flow2  { to{stroke-dashoffset:-60} }
      @keyframes shen-breathe{ 0%,100%{opacity:.8} 50%{opacity:1} }
      @keyframes blink-blue  { 0%,88%,100%{opacity:1} 90%{opacity:0} 94%{opacity:1} 96%{opacity:0} }
      .rp1{animation:ring-pulse  4.0s ease-in-out infinite}
      .rp2{animation:ring-pulse2 5.2s ease-in-out infinite}
      .rp3{animation:ring-pulse3 6.8s ease-in-out infinite}
      .df1{stroke-dasharray:6 14;animation:data-flow  3.2s linear infinite}
      .df2{stroke-dasharray:4 18;animation:data-flow2 4.1s linear infinite}
      .df3{stroke-dasharray:3 20;animation:data-flow  5.0s linear infinite reverse}
      .sb {animation:shen-breathe 3.0s ease-in-out infinite}
      .cb {animation:blink-blue 4.5s ease-in-out infinite}
    </style>
  </defs>

